<!DOCTYPE html>
<html lang="vi">
<head>
    <base href="/login/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to the system - Bakery Inventory</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>
<body>
    <div class="login-container">
        <!-- Inset Background Frame (from Figma design) -->
        <div class="bg-frame"></div>
        
        <!-- Main Wrapper that looks like Figma pink container -->
        <div class="main-wrapper">
            <div class="pink-panel">
                <div class="content-grid">
                    <!-- Left: Login Form -->
                    <div class="form-column">
                        <div class="figma-header">
                            <h1 class="title">Log in</h1>
                            <p class="subtitle">See your growth and get support!</p>
                        </div>
                        
                        <!-- Keep existing IDs for JS compatibility -->
                        <form class="login-form" id="loginForm">
                            <div class="form-group">
                                <label for="email" class="figma-label">Email:</label>
                                <div class="input-wrapper center-input">
                                    <i class="fas fa-user input-icon"></i>
                                    <input type="text" id="email" name="email" placeholder="Enter your email..." required>
                                </div>
                                <div class="error-message" id="emailError"></div>
                            </div>
                        
                            <div class="form-group">
                                <label for="password" class="figma-label">Password:</label>
                                <div class="input-wrapper center-input">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input type="password" id="password" name="password" placeholder="Enter your password..." required>
                                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Hiển thị hoặc ẩn mật khẩu" title="Hiển thị/Ẩn mật khẩu">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="error-message" id="passwordError"></div>
                            </div>
                        
                            <div class="form-options figma-row">
                                <label class="remember-me">
                                    <input type="checkbox" id="rememberMe">
                                    <span class="checkmark"></span>
                                    Remember me
                                </label>
                            </div>
                        
                            <button type="submit" class="login-btn figma-btn" id="loginBtn">
                                <span class="btn-text">Log in</span>
                                <div class="btn-loader">
                                    <div class="spinner"></div>
                                </div>
                            </button>
                        </form>
                    </div>
                    
                    <!-- Right: Images -->
                    <div class="visual-column">
                        <img src="assets/img/banner.png" alt="TMDS-BAKERY Logo" class="logo-visual">
                        <img src="assets/img/banh.png" alt="Blueberry Cake" class="cake-visual">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Toast Notification -->
        <div class="toast" id="toast">
            <div class="toast-content">
                <i class="toast-icon"></i>
                <span class="toast-message"></span>
            </div>
        </div>
    </div>
    
    <script src="assets/js/script.js?v=20251001"></script>
</body>
</html>
