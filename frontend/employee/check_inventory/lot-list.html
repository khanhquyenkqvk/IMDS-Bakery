  <script>
    // Initialize global language to preserve user's selection across pages
    if (window.GlobalLanguage && GlobalLanguage.initialize) {
      GlobalLanguage.initialize();
    } else {
      document.addEventListener('DOMContentLoaded', function(){
        if (window.GlobalLanguage && GlobalLanguage.initialize) GlobalLanguage.initialize();
      });
    }
    // Get username from sessionStorage (from login) - same as homepage
    function updateUserInfo() {
      try {
        const userInfo = JSON.parse(sessionStorage.getItem('user_info') || '{}');
        const userNameEl = document.querySelector('.user-name');
        if (userInfo && userInfo.username && userNameEl) {
          userNameEl.textContent = userInfo.username;
        } else if (userNameEl) {
          userNameEl.textContent = 'Nguyen Van A'; // Fallback
        }
      } catch (error) {
        console.log('Could not get user info from sessionStorage');
        const userNameEl = document.querySelector('.user-name');
        if (userNameEl) {
          userNameEl.textContent = 'Nguyen Van A'; // Fallback
        }
      }
    }

    // Header realtime date/time - same as homepage
    function formatHeaderDate(d) {
        const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        return `${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getDate()}`;
    }
    function formatHeaderTime(d) {
        let h = d.getHours();
        const m = String(d.getMinutes()).padStart(2, '0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12; if (h === 0) h = 12;
        return `${String(h).padStart(2,'0')}:${m} ${ampm}`;
    }
    
    function updateHeaderTime() {
        if (window.GlobalLanguage && typeof window.GlobalLanguage.updateDateTime === 'function') {
            window.GlobalLanguage.updateDateTime();
            return;
        }
        const now = new Date();
        const elDate = document.querySelector('.header .date');
        const elTime = document.querySelector('.header .time');
        if (elDate) elDate.textContent = formatHeaderDate(now);
        if (elTime) elTime.textContent = formatHeaderTime(now);
    }

    // Update user info and time when page loads
    document.addEventListener('DOMContentLoaded', function() {
        updateUserInfo();
        updateHeaderTime();
        setInterval(updateHeaderTime, 60000); // Update every minute
    });

    // Logout handler
    const btnLogout = document.getElementById('btnLogout');
    if (btnLogout) {
      btnLogout.addEventListener('click', function () {
        sessionStorage.removeItem('auth_token');
        sessionStorage.removeItem('user_info');
        sessionStorage.removeItem('user_token');
        localStorage.removeItem('bakery_credentials');
        window.location.href = '../../login/index.html';
      });
    }
  </script>
  <script>
(function () {
  const sidebar = document.querySelector('.sidebar');
  if (!sidebar) return;

  // Điều hướng theo data-href (relative-safe)
  sidebar.addEventListener('click', (e) => {
    const el = e.target.closest('.menu-item[data-href]');
    if (!el) return;

    e.preventDefault();

    const href = el.getAttribute('data-href');     // ví dụ: ../recipe/recipe-list.html
    if (!href) return;

    const abs = new URL(href, window.location).href; // resolve dựa trên trang hiện tại

    // UI active
    sidebar.querySelectorAll('.menu-item').forEach(it => it.classList.remove('active'));
    el.classList.add('active');
    el.setAttribute('aria-current', 'page');

    // Điều hướng
    window.location.assign(abs);
  });

  // Auto-highlight khi F5 / mở trực tiếp
  const here = window.location.pathname;
  sidebar.querySelectorAll('.menu-item[data-href]').forEach(item => {
    const href = item.getAttribute('data-href');
    if (!href) return;
    const resolved = new URL(href, window.location).pathname;
    if (here === resolved || here.endsWith(resolved)) {
      item.classList.add('active');
      item.setAttribute('aria-current', 'page');
    }
  });
})();
</script>
